<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5ec4a8" />
    <meta name="description" content="EverDream — AI Dream Journal with dream visualization, sleep tracking, AI analysis, and NFT minting." />
    
    <!-- SECURITY FIX: Content Security Policy (CSP) -->
    <!-- Restricts resource loading to trusted sources only -->
    <meta 
      http-equiv="Content-Security-Policy" 
      content="default-src 'self'; 
               script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; 
               font-src 'self' https://fonts.gstatic.com; 
               img-src 'self' data: blob: https:; 
               connect-src 'self' https://api.openrouter.ai https://text.pollinations.ai https://*.supabase.co https://*.n8n.io wss://*.supabase.co; 
               worker-src 'self' blob:; 
               manifest-src 'self';" 
    />
    
    <!-- Additional security headers via meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>EverDream — Dream Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400..600&family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Inter:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-paper text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed — app still works
          });
        });
      }
    </script>
  </body>
</html>
