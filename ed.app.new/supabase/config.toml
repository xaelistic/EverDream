# Supabase Configuration for EverDream
# https://supabase.com/docs/guides/cli/config

project_id = "everdream"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
# Add production app URL(s) for signup confirm + password reset redirects
additional_redirect_urls = [
  "https://localhost:5173",
  "http://localhost:5173/#/reset-password",
  "https://everdream.app",
  "https://everdream.app/#/reset-password"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Require email confirmation before first sign-in (matches production intent)
enable_confirmations = true

# Production / Coolify: configure SMTP on the GoTrue (supabase-auth) service.
# Do NOT use Inbucket in production — it only catches mail locally for dev.
# Recommended providers: Resend, Brevo, Postmark, SendGrid, AWS SES.
#
# [auth.email.smtp]
# enabled = true
# host = "smtp.resend.com"
# port = 465
# user = "resend"
# pass = "env(RESEND_API_KEY)"
# admin_email = "auth@everdream.app"
# sender_name = "EverDream"

[auth.external.apple]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""

[auth.external.google]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""

# ── Edge Functions ────────────────────────────────────────────

[functions.analyze-dream]
verify_jwt = true

[functions.generate-image]
verify_jwt = true

[functions.transcribe-audio]
verify_jwt = true

[functions.social-token-sync]
verify_jwt = true

[functions.social-publish]
verify_jwt = true

[functions.share-link]
verify_jwt = false

[functions.social-oauth-tiktok]
verify_jwt = false
